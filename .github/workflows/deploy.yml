name: Build, Scan, Push, and Deploy

on:
  push:
    branches:
      - main

  # Allows manual execution from the GitHub Actions page.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project1-production
  cancel-in-progress: true

env:
  IMAGE_NAME: project1-api

jobs:
  build-scan-deploy:
    name: Build, Scan, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1:
      # Download the repository code to the GitHub-hosted runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2:
      # Log in to Docker Hub using GitHub repository secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3:
      # Build the complete Docker image name.
      - name: Set image name
        run: |
          echo "FULL_IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}" \
            >> "$GITHUB_ENV"

      # Step 4:
      # Build the Docker image with:
      # - a commit-specific tag
      # - the latest tag
      - name: Build Docker image
        run: |
          docker build \
            --tag "${FULL_IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${FULL_IMAGE_NAME}:latest" \
            .

      # Step 5:
      # Scan the exact image that was built.
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FULL_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      # Step 6:
      # Push the image only after the security scan passes.
      - name: Push image to Docker Hub
        run: |
          docker push "${FULL_IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${FULL_IMAGE_NAME}:latest"

      # Step 7:
      # Create and validate the SSH private-key file.
      - name: Configure SSH
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$VM_HOST" ]; then
            echo "ERROR: VM_HOST secret is missing."
            exit 1
          fi

          if [ -z "$VM_PORT" ]; then
            echo "ERROR: VM_PORT secret is missing."
            exit 1
          fi

          if [ -z "$VM_SSH_KEY" ]; then
            echo "ERROR: VM_SSH_KEY secret is missing."
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          # Remove Windows carriage-return characters before saving the key.
          printf '%s\n' "$VM_SSH_KEY" \
            | tr -d '\r' \
            > "$HOME/.ssh/project1_vm_key"

          chmod 600 "$HOME/.ssh/project1_vm_key"

          # Validate that the secret contains a readable private key.
          ssh-keygen -y \
            -f "$HOME/.ssh/project1_vm_key" \
            > /dev/null

          # Save the Azure Load Balancer SSH endpoint host key.
          ssh-keyscan \
            -T 15 \
            -p "$VM_PORT" \
            -H "$VM_HOST" \
            >> "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      # Step 8:
      # Connect to the VM through the Azure Load Balancer NAT rule.
      # The VM pulls and starts the image that passed the Trivy scan.
      - name: Deploy with Docker Compose
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -i "$HOME/.ssh/project1_vm_key" \
            -p "$VM_PORT" \
            "${VM_USERNAME}@${VM_HOST}" \
            "DOCKER_USERNAME='$DOCKER_USERNAME' DOCKER_TOKEN='$DOCKER_TOKEN' bash -s" \
            <<'REMOTE_SCRIPT'

          set -euo pipefail

          PROJECT_DIR="$HOME/Project1"

          echo "Moving to the project directory..."
          cd "$PROJECT_DIR"

          echo "Checking that the environment file exists..."
          if [ ! -f ".env" ]; then
            echo "ERROR: $PROJECT_DIR/.env does not exist."
            exit 1
          fi

          echo "Checking that docker-compose.yml exists..."
          if [ ! -f "docker-compose.yml" ]; then
            echo "ERROR: docker-compose.yml was not found."
            exit 1
          fi

          echo "Logging in to Docker Hub..."
          echo "$DOCKER_TOKEN" |
            docker login \
              --username "$DOCKER_USERNAME" \
              --password-stdin

          echo "Pulling the scanned API image..."
          docker-compose pull

          echo "Starting PostgreSQL and replacing the API container..."
          docker-compose up \
            -d \
            --no-build \
            --remove-orphans

          echo "Waiting for the API to become healthy..."

          for attempt in {1..12}; do
            if curl \
              --fail \
              --silent \
              http://localhost:8080/health \
              > /dev/null; then

              echo "Health check passed."
              break
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "ERROR: API health check failed."

              echo "Compose status:"
              docker-compose ps

              echo "API logs:"
              docker-compose logs --tail=100 web

              exit 1
            fi

            echo "Application is not ready yet. Attempt $attempt of 12..."
            sleep 5
          done

          echo "Current container status:"
          docker-compose ps

          echo "Removing unused Docker images..."
          docker image prune -f

          echo "Deployment completed successfully."

          REMOTE_SCRIPT