name: Build, Scan, Push, and Deploy

on:
  push:
    branches:
      - main

  # Allows manual testing from the GitHub Actions page.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project1-production
  cancel-in-progress: true

env:
  IMAGE_NAME: project1-api

jobs:
  build-scan-deploy:
    name: Build, Scan, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1:
      # Download the latest main-branch code to the GitHub runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2:
      # Authenticate GitHub Actions with Docker Hub.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Step 3:
      # Create the complete Docker Hub image name.
      - name: Set image name
        run: |
          echo "FULL_IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}" \
            >> "$GITHUB_ENV"

      # Step 4:
      # Build two tags:
      # - commit SHA for version tracking and rollback
      # - latest for the production Compose deployment
      - name: Build Docker image
        run: |
          docker build \
            --tag "${FULL_IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${FULL_IMAGE_NAME}:latest" \
            .

      # Step 5:
      # Scan the exact image built in the previous step.
      # Exit code 1 stops deployment when a fixable HIGH or CRITICAL
      # vulnerability is detected.
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FULL_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      # Step 6:
      # Only push the image if the vulnerability scan succeeds.
      - name: Push image to Docker Hub
        run: |
          docker push "${FULL_IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${FULL_IMAGE_NAME}:latest"

      # Step 7:
      # Create the SSH private-key file on the temporary GitHub runner.
      - name: Configure SSH
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"

          printf '%s\n' "$VM_SSH_KEY" > "$HOME/.ssh/project1_vm_key"

          chmod 600 "$HOME/.ssh/project1_vm_key"

          ssh-keyscan \
            -p "$VM_PORT" \
            -H "$VM_HOST" \
            >> "$HOME/.ssh/known_hosts"

      # Step 8:
      # Connect through the Azure Load Balancer NAT port.
      # The VM pulls the exact image already built and scanned.
      - name: Deploy with Docker Compose
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          ssh \
            -i "$HOME/.ssh/project1_vm_key" \
            -p "$VM_PORT" \
            "${VM_USERNAME}@${VM_HOST}" \
            "DOCKER_USERNAME='$DOCKER_USERNAME' DOCKER_TOKEN='$DOCKER_TOKEN' bash -s" \
            <<'REMOTE_SCRIPT'

              set -euo pipefail

              PROJECT_DIR="$HOME/Project1"

              echo "Moving to the project directory..."
              cd "$PROJECT_DIR"

              echo "Checking that the environment file exists..."
              if [ ! -f ".env" ]; then
                echo "ERROR: $PROJECT_DIR/.env does not exist."
                exit 1
              fi

              echo "Logging in to Docker Hub..."
              echo "$DOCKER_TOKEN" |
                docker login \
                  --username "$DOCKER_USERNAME" \
                  --password-stdin

              echo "Pulling the scanned API image..."
              docker compose pull web

              echo "Starting PostgreSQL and replacing the API container..."
              docker compose up -d --no-build --remove-orphans

              echo "Waiting for the API to become healthy..."

              for attempt in {1..12}; do
                if curl \
                  --fail \
                  --silent \
                  http://localhost:8080/health > /dev/null; then

                  echo "Health check passed."
                  break
                fi

                if [ "$attempt" -eq 12 ]; then
                  echo "ERROR: API health check failed."

                  echo "Compose status:"
                  docker compose ps

                  echo "API logs:"
                  docker compose logs --tail=100 web

                  exit 1
                fi

                echo "Application is not ready yet. Attempt $attempt of 12..."
                sleep 5
              done

              echo "Current container status:"
              docker compose ps

              echo "Removing unused Docker images..."
              docker image prune -f

              echo "Deployment completed successfully."

          REMOTE_SCRIPT